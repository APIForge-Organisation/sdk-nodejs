name: Release

on:
  push:
    branches: [main]

jobs:
  tests:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm tests

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      contents: write  # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check if version is already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view apiforgejs version 2>/dev/null || echo "none")
          echo "pkg_version=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PKG_VERSION" != "$NPM_VERSION" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "New version detected: $PKG_VERSION (npm has $NPM_VERSION)"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "Version $PKG_VERSION is already on npm — skipping publish."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version_check.outputs.should_publish == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version_check.outputs.pkg_version }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: `## apiforgejs v${version}\n\nSee [CHANGELOG.md](https://github.com/APIForge-Organisation/sdk-nodejs/blob/main/CHANGELOG.md) for details.\n\n\`\`\`bash\nnpm install apiforgejs@${version}\n\`\`\``,
              draft: false,
              prerelease: version.startsWith('0.'),
            });
